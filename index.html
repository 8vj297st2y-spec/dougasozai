<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Grunge Generator - MP4 Progress Convert</title>
    <style>
        body { background: #1a1a1a; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .canvas-wrapper { background: #000; border: 2px solid #444; line-height: 0; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        canvas { width: 854px; height: 480px; } 
        .ui-panel { margin-top: 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 12px; width: 600px; background: #2a2a2a; padding: 20px; border-radius: 12px; }
        label { font-size: 12px; color: #999; align-self: center; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #ff4444; }
        .footer-btns { margin-top: 20px; }
        button { padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; background: #ff4444; color: white; }
        button:hover { background: #ff6666; }

        /* 進捗バー */
        #progressBox {
            width: 600px;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: #ff4444;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 15px;">Grunge Generator <span style="font-size: 0.6em; opacity: 0.5;">MP4 Progress Convert</span></h2>
    
    <div class="canvas-wrapper">
        <canvas id="mainCanvas" width="1920" height="1080"></canvas>
    </div>

    <div class="ui-panel">
        <label>更新頻度 (Speed):</label>
        <input type="range" id="speed" min="1" max="15" value="6">
        
        <label>傷の数 (Count):</label>
        <input type="range" id="density" min="1" max="30" value="12">
        
        <label>傷の最大長さ (Max Length):</label>
        <input type="range" id="length" min="10" max="300" value="80">

        <label>線の最大太さ (Thickness):</label>
        <input type="range" id="thickness" min="1" max="10" value="3">

        <label>不透明度 (Opacity):</label>
        <input type="range" id="intensity" min="10" max="255" value="160">
    </div>

    <div class="footer-btns">
        <button id="recordBtn">1080p録画開始 (5秒)</button>
    </div>

    <!-- 進捗バー -->
    <div id="progressBox"><div id="progressBar"></div></div>

    <!-- FFmpeg.wasm -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.2/dist/ffmpeg.min.js"></script>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const recordBtn = document.getElementById('recordBtn');
        const progressBox = document.getElementById("progressBox");
        const progressBar = document.getElementById("progressBar");

        const params = {
            speed: 6,
            density: 12,
            length: 80,
            thickness: 3,
            intensity: 160
        };

        document.querySelectorAll('input').forEach(input => {
            input.oninput = (e) => params[e.target.id] = parseFloat(e.target.value);
        });

        // ============================
        // 傷のみ（Dust削除）
        // ============================
        function drawShortScratch() {

            const alpha = (params.intensity / 255) * (Math.random() * 0.5 + 0.5);
            ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            const maxLen = params.length * (Math.random() * 19.5 + 0.05);
            const segments = Math.floor(Math.random() * 20) + 1;
            const angleJitter = (Math.random() * 2.0 + 0.2);
            const step = maxLen / segments;

            let x = Math.random() * 1920;
            let y = Math.random() * 1080;
            let angle = Math.random() * Math.PI * 2;

            ctx.beginPath();
            ctx.moveTo(x, y);

            for (let i = 0; i < segments; i++) {
                const cp1x = x + Math.cos(angle) * step;
                const cp1y = y + Math.sin(angle) * step;

                angle += (Math.random() - 0.5) * angleJitter;

                const nx = cp1x + Math.cos(angle) * step;
                const ny = cp1y + Math.sin(angle) * step;

                ctx.lineWidth = Math.random() * params.thickness + 0.5;

                ctx.quadraticCurveTo(cp1x, cp1y, nx, ny);

                x = nx;
                y = ny;
            }

            ctx.stroke();
        }

        // ============================
        // メイン描画
        // ============================
        function render() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, 1920, 1080);

            for (let i = 0; i < params.density; i++) {
                drawShortScratch();
            }
        }

        let lastTime = 0;
        function loop(time) {
            const interval = 1000 / (params.speed * 2);
            if (time - lastTime > interval) {
                render();
                lastTime = time;
            }
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        // ============================
        // WebM録画 → MP4変換（進捗バー付き）
        // ============================
        recordBtn.onclick = async () => {
            recordBtn.innerText = "RECORDING...";
            recordBtn.disabled = true;

            const stream = canvas.captureStream(30);

            const mimeType = "video/webm;codecs=vp8";

            const recorder = new MediaRecorder(stream, {
                mimeType: mimeType,
                videoBitsPerSecond: 12000000
            });

            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);

            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: mimeType });

                // ============================
                // WebM → MP4（進捗バー付き）
                // ============================
                recordBtn.innerText = "CONVERTING...";
                progressBox.style.display = "block";
                progressBar.style.width = "0%";

                const { createFFmpeg, fetchFile } = FFmpeg;
                const ffmpeg = createFFmpeg({
                    log: true,
                    progress: ({ ratio }) => {
                        progressBar.style.width = `${Math.floor(ratio * 100)}%`;
                    }
                });

                await ffmpeg.load();

                ffmpeg.FS("writeFile", "input.webm", await fetchFile(blob));

                await ffmpeg.run(
                    "-i", "input.webm",
                    "-c:v", "libx264",
                    "-preset", "ultrafast",
                    "output.mp4"
                );

                const data = ffmpeg.FS("readFile", "output.mp4");
                const mp4Blob = new Blob([data.buffer], { type: "video/mp4" });

                const url = URL.createObjectURL(mp4Blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `grunge_${Date.now()}.mp4`;
                a.click();

                progressBox.style.display = "none";
                recordBtn.innerText = "1080p録画開始 (5秒)";
                recordBtn.disabled = false;
            };

            recorder.start();
            setTimeout(() => recorder.stop(), 5000);
        };
    </script>
</body>
</html>
