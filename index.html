<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Three.js Debug</title>
<style>
  body { margin:0; background:#000; color:#0f0; font-family:monospace; }
  #log { position:fixed; top:0; left:0; white-space:pre; padding:10px; }
</style>
</head>
<body>

<div id="log"></div>
<canvas id="canvas" width="1280" height="720"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
<script>
const log = msg => {
  document.getElementById("log").textContent += msg + "\n";
  console.log(msg);
};

try {
  const canvas = document.getElementById('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas });
  renderer.setSize(1280,720);
  log("Renderer OK");

  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

  const geometry = new THREE.PlaneGeometry(2,2);

  const material = new THREE.ShaderMaterial({
    uniforms:{
      u_time:{value:0}
    },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
    fragmentShader:`
      precision highp float;
      varying vec2 vUv;
      uniform float u_time;
      void main(){
        float v = sin(vUv.x*20.0 + u_time*3.0) * 0.5 + 0.5;
        gl_FragColor = vec4(vec3(v),1.0);
      }
    `
  });

  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);
  log("Scene + Mesh OK");

  let start = performance.now();
  function render(){
    material.uniforms.u_time.value = (performance.now() - start) / 1000;
    renderer.render(scene, camera);
    requestAnimationFrame(render);
  }
  render();
  log("Render loop started");

} catch(e) {
  log("ERROR:");
  log(e.message);
}
</script>

</body>
</html>
