<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>1080p Procedural Generator</title>
<style>
  body { margin:0; background:#111; color:#eee; font-family:sans-serif; }
  #ui {
    position:fixed; top:10px; left:10px; background:#222a; padding:10px;
    backdrop-filter: blur(6px); border-radius:6px;
  }
  label { display:block; margin:6px 0; }
</style>
</head>
<body>

<canvas id="canvas" width="1920" height="1080"></canvas>

<div id="ui">
  <label>速度 <input id="speed" type="range" min="0" max="5" step="0.01" value="1"></label>
  <label>密度 <input id="density" type="range" min="0" max="1" step="0.01" value="0.5"></label>
  <label>スケール <input id="scale" type="range" min="0.1" max="10" step="0.1" value="2"></label>
  <label>モード
    <select id="mode">
      <option value="0">グランジ</option>
      <option value="1">ライトリーク</option>
      <option value="2">フォグ</option>
    </select>
  </label>
  <button id="startRec">録画開始</button>
  <button id="stopRec">録画停止</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas });
renderer.setSize(1920,1080);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const geometry = new THREE.PlaneGeometry(2,2);

const material = new THREE.ShaderMaterial({
  uniforms:{
    u_time:{value:0},
    u_speed:{value:1},
    u_density:{value:0.5},
    u_scale:{value:2},
    u_mode:{value:0},
    u_resolution:{value:new THREE.Vector2(1920,1080)}
  },
  vertexShader:`varying vec2 vUv; void main(){ vUv=uv; gl_Position=vec4(position,1.0); }`,
  fragmentShader:`
    precision highp float;
    varying vec2 vUv;
    uniform float u_time, u_speed, u_density, u_scale;
    uniform int u_mode;

    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453123); }
    float noise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
      vec2 u=f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }

    void main(){
      vec2 uv = vUv * u_scale;
      float t = u_time * u_speed;
      float n;

      if(u_mode==0){
        n=noise(uv+t)+0.5*noise(uv*2.0-t*0.5);
        n=pow(n,3.0-u_density*2.0);
        gl_FragColor=vec4(vec3(n),1.0);

      } else if(u_mode==1){
        float band=smoothstep(0.2,0.8,uv.x+sin(t*0.2)*0.3);
        n=noise(uv+vec2(t*0.2,t*0.1));
        vec3 col=vec3(1.0,0.6,0.2)*band*(0.5+n);
        col*=0.5+u_density;
        gl_FragColor=vec4(col,1.0);

      } else {
        vec2 p=(vUv-0.5)*2.0;
        float dist=length(p);
        n=noise(uv+t*0.1);
        float fog=smoothstep(1.0,0.0,dist+n*u_density);
        gl_FragColor=vec4(mix(vec3(0.0),vec3(0.9),fog),1.0);
      }
    }
  `
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

const speed = document.getElementById('speed');
const density = document.getElementById('density');
const scale = document.getElementById('scale');
const mode = document.getElementById('mode');

speed.oninput = ()=> material.uniforms.u_speed.value = +speed.value;
density.oninput = ()=> material.uniforms.u_density.value = +density.value;
scale.oninput = ()=> material.uniforms.u_scale.value = +scale.value;
mode.oninput = ()=> material.uniforms.u_mode.value = +mode.value;

let start = performance.now();
function render(){
  material.uniforms.u_time.value = (performance.now() - start) / 1000;
  renderer.render(scene, camera);
  requestAnimationFrame(render);
}
render();

// ------------------ Recording ------------------
let recorder, chunks=[];

function getMime(){
  const types = [
    "video/mp4;codecs=h264",
    "video/webm;codecs=vp9",
    "video/webm;codecs=vp8",
    "video/webm"
  ];
  return types.find(t => MediaRecorder.isTypeSupported(t)) || "";
}

document.getElementById('startRec').onclick = ()=>{
  const stream = canvas.captureStream(30);
  recorder = new MediaRecorder(stream, { mimeType:getMime() });

  chunks=[];
  recorder.ondataavailable = e=> chunks.push(e.data);
  recorder.onstop = ()=>{
    const blob = new Blob(chunks, {type:recorder.mimeType});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "output." + (recorder.mimeType.includes("mp4") ? "mp4" : "webm");
    a.click();
    URL.revokeObjectURL(url);
  };
  recorder.start();
};

document.getElementById('stopRec').onclick = ()=>{
  if(recorder && recorder.state==="recording") recorder.stop();
};
</script>

</body>
</html>
